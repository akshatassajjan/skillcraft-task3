<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Quiz Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background:#111827;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 25px rgba(0,255,255,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#22d3ee;
}

.screen{
    display:none;
}

.active{
    display:block;
}

.btn{
    background:#06b6d4;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#0891b2;
}

.center{
    text-align:center;
}

.progress-container{
    width:100%;
    height:12px;
    background:#374151;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}

.progress{
    height:100%;
    width:0%;
    background:#22c55e;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.question{
    font-size:24px;
    margin-bottom:20px;
}

.option{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
    cursor:pointer;
    transition:.3s;
}

.option:hover{
    background:#334155;
}

.correct{
    background:#16a34a !important;
}

.wrong{
    background:#dc2626 !important;
}

.score-box{
    text-align:center;
}

.score{
    font-size:50px;
    color:#22c55e;
    margin:15px 0;
}

.highscore{
    color:#facc15;
    margin-bottom:20px;
}

.timer{
    color:#f87171;
    font-weight:bold;
}

.badge{
    background:#2563eb;
    padding:5px 12px;
    border-radius:20px;
}

.footer{
    margin-top:20px;
    text-align:center;
    opacity:.7;
}

@media(max-width:600px){
.question{
font-size:20px;
}
}
</style>
</head>
<body>

<div class="container">

<!-- Start Screen -->
<div id="startScreen" class="screen active">
    <h1>🎯 Ultimate Quiz Challenge</h1>

    <div class="center">
        <p style="margin-bottom:20px">
            Test your knowledge with exciting questions.
        </p>

        <button class="btn" onclick="startQuiz()">
            Start Quiz
        </button>
    </div>
</div>

<!-- Quiz Screen -->
<div id="quizScreen" class="screen">

    <div class="progress-container">
        <div class="progress" id="progress"></div>
    </div>

    <div class="top-bar">
        <div class="badge">
            Question <span id="currentQuestion">1</span>/<span id="totalQuestions">10</span>
        </div>

        <div class="timer">
            ⏳ <span id="timer">15</span>s
        </div>
    </div>

    <div class="question" id="question"></div>

    <div id="options"></div>

</div>

<!-- Result Screen -->
<div id="resultScreen" class="screen">

    <h1>🏆 Quiz Completed</h1>

    <div class="score-box">
        <div class="score" id="finalScore">0</div>

        <div class="highscore">
            High Score:
            <span id="highScore">0</span>
        </div>

        <button class="btn" onclick="restartQuiz()">
            Play Again
        </button>
    </div>

</div>

<div class="footer">
    SkillCraft Technology - Task 03
</div>

</div>

<script>

const quizData = [

{
question:"Which language runs in a web browser?",
options:["Java","C","Python","JavaScript"],
answer:"JavaScript"
},

{
question:"What does HTML stand for?",
options:[
"Hyper Text Markup Language",
"High Text Machine Language",
"Hyper Transfer Markup Language",
"Home Tool Markup Language"
],
answer:"Hyper Text Markup Language"
},

{
question:"Which company developed Java?",
options:["Microsoft","Sun Microsystems","Apple","Google"],
answer:"Sun Microsystems"
},

{
question:"Which symbol is used for comments in JavaScript?",
options:["//","#","<!-- -->","**"],
answer:"//"
},

{
question:"What does CSS stand for?",
options:[
"Cascading Style Sheets",
"Creative Style System",
"Computer Style Sheet",
"Colorful Style Sheet"
],
answer:"Cascading Style Sheets"
},

{
question:"Which HTML tag is used for images?",
options:["<img>","<picture>","<image>","<src>"],
answer:"<img>"
},

{
question:"Which keyword declares a variable in JavaScript?",
options:["var","let","Both","None"],
answer:"Both"
},

{
question:"Which method prints in console?",
options:[
"console.print()",
"print()",
"console.log()",
"log.console()"
],
answer:"console.log()"
},

{
question:"What is the capital of India?",
options:["Delhi","Mumbai","Bangalore","Kolkata"],
answer:"Delhi"
},

{
question:"Which is the largest planet?",
options:["Earth","Mars","Jupiter","Saturn"],
answer:"Jupiter"
}

];

let current = 0;
let score = 0;
let timer;
let timeLeft = 15;

const startScreen=document.getElementById("startScreen");
const quizScreen=document.getElementById("quizScreen");
const resultScreen=document.getElementById("resultScreen");

function startQuiz(){

startScreen.classList.remove("active");
quizScreen.classList.add("active");

loadQuestion();
}

function loadQuestion(){

clearInterval(timer);

timeLeft=15;
document.getElementById("timer").innerText=timeLeft;

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerText=timeLeft;

if(timeLeft<=0){
clearInterval(timer);
nextQuestion();
}

},1000);

let q=quizData[current];

document.getElementById("question").innerText=q.question;

document.getElementById("currentQuestion").innerText=current+1;
document.getElementById("totalQuestions").innerText=quizData.length;

let progress=((current)/quizData.length)*100;
document.getElementById("progress").style.width=progress+"%";

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

q.options.forEach(option=>{

let div=document.createElement("div");

div.classList.add("option");
div.innerText=option;

div.onclick=()=>selectAnswer(div,option);

optionsDiv.appendChild(div);

});

}

function selectAnswer(element,selected){

clearInterval(timer);

let correct=quizData[current].answer;

let options=document.querySelectorAll(".option");

options.forEach(op=>{

if(op.innerText===correct){
op.classList.add("correct");
}

if(op.innerText===selected && selected!==correct){
op.classList.add("wrong");
}

op.style.pointerEvents="none";

});

if(selected===correct){
score++;
}

setTimeout(()=>{
nextQuestion();
},1000);

}

function nextQuestion(){

current++;

if(current<quizData.length){
loadQuestion();
}
else{
showResult();
}

}

function showResult(){

quizScreen.classList.remove("active");
resultScreen.classList.add("active");

document.getElementById("finalScore").innerText=
`${score}/${quizData.length}`;

let high=localStorage.getItem("quizHighScore") || 0;

if(score>high){
localStorage.setItem("quizHighScore",score);
high=score;
}

document.getElementById("highScore").innerText=high;

launchConfetti();

}

function restartQuiz(){

current=0;
score=0;

resultScreen.classList.remove("active");
quizScreen.classList.add("active");

loadQuestion();

}

function launchConfetti(){

if(score>=7){

for(let i=0;i<100;i++){

let confetti=document.createElement("div");

confetti.style.position="fixed";
confetti.style.width="8px";
confetti.style.height="8px";
confetti.style.background=
`hsl(${Math.random()*360},100%,50%)`;

confetti.style.left=Math.random()*100+"vw";
confetti.style.top="-20px";

confetti.style.zIndex="9999";

document.body.appendChild(confetti);

let fall=Math.random()*3000+2000;

confetti.animate([
{transform:"translateY(0px)"},
{transform:`translateY(${window.innerHeight+100}px)`}
],{
duration:fall,
iterations:1
});

setTimeout(()=>{
confetti.remove();
},fall);

}

}

}

</script>

</body>
</html>
